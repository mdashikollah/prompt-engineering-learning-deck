<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <p class="subtitle">Real-time weather information at your fingertips</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name..." 
                    autocomplete="off"
                >
                <button id="searchBtn" class="btn-search">
                    <i class="fas fa-search"></i> Search
                </button>
                <button id="locationBtn" class="btn-location" title="Use my location">
                    <i class="fas fa-map-marker-alt"></i>
                </button>
            </div>
            <div id="suggestions" class="suggestions"></div>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="spinner hidden">
            <div class="spinner-ring"></div>
            <p>Loading weather data...</p>
        </div>

        <!-- Current Weather Section -->
        <div id="currentWeather" class="current-weather hidden">
            <div class="weather-card">
                <div class="city-info">
                    <h2 id="cityName"></h2>
                    <p id="weatherTime"></p>
                </div>
                <div class="weather-main">
                    <div class="temp-section">
                        <span id="temperature" class="temperature"></span>
                        <img id="weatherIcon" class="weather-icon" src="" alt="Weather icon">
                    </div>
                    <div class="weather-description">
                        <p id="description"></p>
                        <p id="feelsLike"></p>
                    </div>
                </div>
                <div class="weather-details">
                    <div class="detail">
                        <i class="fas fa-droplet"></i>
                        <div>
                            <span>Humidity</span>
                            <strong id="humidity"></strong>
                        </div>
                    </div>
                    <div class="detail">
                        <i class="fas fa-wind"></i>
                        <div>
                            <span>Wind Speed</span>
                            <strong id="windSpeed"></strong>
                        </div>
                    </div>
                    <div class="detail">
                        <i class="fas fa-compress"></i>
                        <div>
                            <span>Pressure</span>
                            <strong id="pressure"></strong>
                        </div>
                    </div>
                    <div class="detail">
                        <i class="fas fa-eye"></i>
                        <div>
                            <span>Visibility</span>
                            <strong id="visibility"></strong>
                        </div>
                    </div>
                    <div class="detail">
                        <i class="fas fa-gauge"></i>
                        <div>
                            <span>UV Index</span>
                            <strong id="uvIndex"></strong>
                        </div>
                    </div>
                    <div class="detail">
                        <i class="fas fa-cloud-rain"></i>
                        <div>
                            <span>Chance of Rain</span>
                            <strong id="rainChance"></strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Forecast Section -->
        <div id="forecastSection" class="forecast-section hidden">
            <h3>5-Day Forecast</h3>
            <div id="forecastCards" class="forecast-cards"></div>
        </div>

        <!-- Hourly Forecast -->
        <div id="hourlySection" class="hourly-section hidden">
            <h3>Hourly Forecast (Next 24 Hours)</h3>
            <div id="hourlyCards" class="hourly-cards"></div>
        </div>

        <!-- Favorite Cities -->
        <div class="favorites-section">
            <h3>Favorite Cities</h3>
            <div id="favoritesList" class="favorites-list">
                <p class="empty-message">No favorites yet. Add cities to your favorites!</p>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
